name: Flo Tests 🧪

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  flo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run flo tests
        run: pnpm --filter flo test
