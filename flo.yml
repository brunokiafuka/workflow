project: "Workflow"

init:
  - install-dependencies:
      name: Install dependencies
      run: pnpm install

commands:
  test:
    description: Run the test suite
    command: pnpm --filter flo test
    aliases: [t]
  format:
    description: Format the code
    command: pnpm format
    aliases: [fmt]
  lint:
    description: Lint the code
    command: pnpm lint && pnpm format:check
    aliases: [l]
  release-flo:
    description: Release a new version of flo
    command: sh scripts/release.sh
    aliases: [fr]
    interactive: true
  dev-docs:
    description: Build and deploy the docs
    command: pnpm --filter docs dev
    aliases: [dd]
    interactive: true
