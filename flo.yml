project: "Workflow"

init:
  - install-dependencies:
      name: Install dependencies
      run: pnpm install

commands:
  test:
    description: Run the test suite
    command: pnpm --filter flo test
    aliases: [t]
  release-flo:
    description: Release a new version of flo
    command: sh scripts/release.sh
    aliases: [fr]
    interactive: true
